name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Detect prerelease
        id: version
        run: |
          VERSION_NAME=${GITHUB_REF#refs/tags/v}
          echo "name=$VERSION_NAME" >> $GITHUB_OUTPUT
          if [[ "$VERSION_NAME" =~ (rc|alpha|beta) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Derive mirror tag
        id: mirror_tag
        run: |
          code=$(grep '^version\.code=' gradle.properties | cut -d= -f2)
          echo "mirror_tag=${code}-${{ steps.version.outputs.name }}" >> "$GITHUB_OUTPUT"

      - name: Build APKs
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Rename APK to versioned name
        run: |
          cd app/build/outputs/apk/release
          mv app-release.apk discover-ads-filter-v${{ steps.version.outputs.name }}-release.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: discover-ads-filter-v${{ steps.version.outputs.name }}
          path: |
            app/build/outputs/apk/release/*.apk

      - name: Generate release notes
        id: changelog
        continue-on-error: true
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --latest --strip header
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.RELEASE_PAT }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: ${{ steps.changelog.outputs.content || '' }}
          files: |
            app/build/outputs/apk/release/*.apk

      - name: Mirror to Xposed-Modules-Repo
        uses: softprops/action-gh-release@v3
        with:
          repository: Xposed-Modules-Repo/eu.hxreborn.discoveradsfilter
          token: ${{ secrets.XPOSED_REPO_PAT }}
          tag_name: ${{ steps.mirror_tag.outputs.mirror_tag }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          body: ${{ steps.changelog.outputs.content || '' }}
          files: app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: true
          make_latest: true

      - name: Clean up keystore
        if: always()
        run: rm -f release.keystore
